# =============================================================================
# Pipeline DevSecOps - api-audit-demo
# Cas pratique de l'expose sur l'audit des applications
# =============================================================================

name: DevSecOps Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ===========================================================================
  # ETAPE 1 : SAST - Analyse statique de securite
  # Detecte les failles dans le code source sans executer l'application.
  # ===========================================================================
  sast:
    name: "SAST - Semgrep"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Analyse Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/nodejs
            p/secrets
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  # ===========================================================================
  # ETAPE 2 : Analyse des dependances vulnerables
  # Detecte les CVE dans les bibliotheques tierces.
  # ===========================================================================
  dependency-check:
    name: "Dependances - npm audit"
    runs-on: ubuntu-latest
    needs: sast
    if: always()

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high

  # ===========================================================================
  # ETAPE 3 : Tests et Quality Gate
  # Execute les tests unitaires et verifie la couverture de code.
  # ===========================================================================
  quality-gate:
    name: "Quality Gate - Jest + SonarQube"
    runs-on: ubuntu-latest
    needs: dependency-check
    if: always()

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Tests unitaires avec couverture
        run: npm test -- --coverage

      - name: Analyse SonarQube
        # continue-on-error: true   # IMPORTANT (sinon ça bloque tout)
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=api-audit-demo
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.qualitygate.wait=true

  # ===========================================================================
  # ETAPE 4 : DAST - Test dynamique sur staging
  # ===========================================================================
  dast:
    name: "DAST - OWASP ZAP (local)"
    runs-on: ubuntu-latest
    needs: quality-gate
    if: always()

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Start API
        run: |
          node src/server.js &
          sleep 10

      - name: OWASP ZAP Scan
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: http://localhost:3000
          fail_action: true
          artifact_name: "zap-report"
